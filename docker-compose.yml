services:
  postgres:
    image: postgres:16-alpine
    container_name: factoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: factoring
      POSTGRES_PASSWORD: factoring
      POSTGRES_DB: factoring
    ports:
      - '5432:5432'
    volumes:
      - factoring_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U factoring -d factoring']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  factoring_postgres_data:
